<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="QuoteApp"/>
  <title>Quote Generator</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --accent: #e94560;
      --muted: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.12);
    }
    .light {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a2e;
      --accent: #e94560;
      --muted: #888;
      --border: rgba(0,0,0,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--border);
    }
    .topbar h1 { font-size: 17px; font-weight: 600; }
    .topbar-icons { display: flex; gap: 12px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      color: var(--text);
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .icon-btn:active { background: var(--card); }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 24px;
    }

    /* CATEGORY PILLS */
    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pill {
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* CARD */
    .quote-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      transition: opacity 0.35s ease, transform 0.35s ease;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
    }
    .quote-card.fade { opacity: 0; transform: scale(0.97); }

    .quote-mark {
      font-size: 56px;
      line-height: 0.7;
      color: var(--accent);
      font-family: Georgia, serif;
      opacity: 0.7;
    }
    .quote-text {
      font-size: 19px;
      line-height: 1.75;
      font-style: italic;
      font-family: Georgia, serif;
      color: var(--text);
    }
    .quote-author {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .quote-category {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      opacity: 0.8;
    }

    /* FAVORITE BTN */
    .fav-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .fav-btn:active { transform: scale(1.3); }

    /* BUTTONS */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 480px;
    }
    .btn {
      flex: 1;
      min-width: 120px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* COUNTER */
    .counter {
      font-size: 13px;
      color: var(--muted);
    }

    /* FAVORITES PANEL */
    .fav-panel {
      display: none;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }
    .fav-panel.open { display: flex; }
    .fav-panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .fav-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .fav-item p { color: var(--text); font-style: italic; }
    .fav-item span { color: var(--accent); font-size: 12px; font-weight: 600; }
    .remove-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      flex-shrink: 0;
    }
    .empty-msg {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1>✨ QuoteApp</h1>
    <div class="topbar-icons">
      <button class="icon-btn" onclick="toggleFav()" title="Favorites">❤️</button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme">🌙</button>
    </div>
  </div>

  <!-- MAIN VIEW -->
  <div class="main" id="mainView">

    <!-- CATEGORY PILLS -->
    <div class="pills">
      <button class="pill active" onclick="setCategory('all', this)">All</button>
      <button class="pill" onclick="setCategory('motivation', this)">Motivation</button>
      <button class="pill" onclick="setCategory('life', this)">Life</button>
      <button class="pill" onclick="setCategory('success', this)">Success</button>
      <button class="pill" onclick="setCategory('wisdom', this)">Wisdom</button>
    </div>

    <!-- QUOTE CARD -->
    <div class="quote-card" id="card">
      <button class="fav-btn" onclick="toggleFavorite()" id="favBtn" title="Add to favorites">🤍</button>
      <div class="quote-mark">"</div>
      <p class="quote-text" id="quoteText">Loading...</p>
      <p class="quote-author" id="quoteAuthor">...</p>
      <span class="quote-category" id="quoteCat">...</span>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="shareQuote()">🔗 Share</button>
      <button class="btn btn-primary" onclick="showQuote()">↻ New Quote</button>
      <button class="btn btn-secondary" onclick="copyQuote()">📋 Copy</button>
    </div>

    <p class="counter" id="counter"></p>
  </div>

  <!-- FAVORITES PANEL -->
  <div class="fav-panel" id="favPanel">
    <h2>❤️ My Favorites</h2>
    <div id="favList"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

let lastIndex = -1;
let currentCategory = 'all';
let currentQuote = null;
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let isLight = false;
let showingFav = false;

function getFiltered() {
  if (currentCategory === 'all') return quotes;
  return quotes.filter(q => q.cat === currentCategory);
}

function showQuote() {
  const filtered = getFiltered();
  const card = document.getElementById('card');
  card.classList.add('fade');
  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * filtered.length); }
    while (filtered.length > 1 && idx === lastIndex);
    lastIndex = idx;
    currentQuote = filtered[idx];
    document.getElementById('quoteText').textContent = currentQuote.text;
    document.getElementById('quoteAuthor').textContent = '— ' + currentQuote.author;
    document.getElementById('quoteCat').textContent = currentQuote.cat.toUpperCase();
    const isFaved = favorites.some(f => f.text === currentQuote.text);
    document.getElementById('favBtn').textContent = isFaved ? '❤️' : '🤍';
    document.getElementById('counter').textContent = `Showing from ${filtered.length} quotes`;
    card.classList.remove('fade');
  }, 350);
}

function setCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  lastIndex = -1;
  showQuote();
}

function toggleFavorite() {
  if (!currentQuote) return;
  const idx = favorites.findIndex(f => f.text === currentQuote.text);
  if (idx === -1) {
    favorites.push(currentQuote);
    document.getElementById('favBtn').textContent = '❤️';
    showToast('Added to favorites ❤️');
  } else {
    favorites.splice(idx, 1);
    document.getElementById('favBtn').textContent = '🤍';
    showToast('Removed from favorites');
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
}

function toggleFav() {
  showingFav = !showingFav;
  document.getElementById('mainView').style.display = showingFav ? 'none' : 'flex';
  const panel = document.getElementById('favPanel');
  panel.classList.toggle('open', showingFav);
  if (showingFav) renderFavs();
}

function renderFavs() {
  const list = document.getElementById('favList');
  if (favorites.length === 0) {
    list.innerHTML = '<p class="empty-msg">No favorites yet. Tap 🤍 on a quote to save it!</p>';
    return;
  }
  list.innerHTML = favorites.map((f, i) => `
    <div class="fav-item">
      <div>
        <p>"${f.text}"</p>
        <span>— ${f.author}</span>
      </div>
      <button class="remove-btn" onclick="removeFav(${i})">✕</button>
    </div>
  `).join('');
}

function removeFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem('favorites', JSON.stringify(favorites));
  renderFavs();
}

function shareQuote() {
  if (!currentQuote) return;
  const text = `"${currentQuote.text}" — ${currentQuote.author}`;
  if (navigator.share) {
    navigator.share({ title: 'Quote', text });
  } else {
    navigator.clipboard.writeText(text);
    showToast('Quote copied to clipboard! 📋');
  }
}

function copyQuote() {
  if (!currentQuote) return;
  const text = `"${currentQuote.text}" — ${currentQuote.author}`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied! 📋'));
}

function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

showQuote();
</script>
